<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>統合デジタル手帳 Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --danger: #e74c3c; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 80px; color: #333; overflow-x: hidden; }
        header { background: var(--primary); color: white; padding: 12px; text-align: center; font-weight: bold; }
        
        /* リスト表示 */
        .tab-bar { display: flex; overflow-x: auto; background: #fff; padding: 10px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .tab { padding: 8px 16px; margin-right: 8px; border-radius: 20px; background: #eee; white-space: nowrap; font-size: 0.85rem; }
        .tab.active { background: var(--primary); color: white; }
        .page-card { background: white; margin: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .card-header { padding: 12px 15px; background: #fdfdfd; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        .img-container { width: 100%; overflow: hidden; background: #fafafa; touch-action: pinch-zoom; }
        .diary-img { width: 100%; display: block; transition: transform 0.2s; }
        .schedule-box { padding: 12px; border-top: 1px solid #eee; }
        .event-item { font-size: 0.9rem; padding: 8px 0; border-bottom: 1px dashed #eee; display: flex; }
        .time-tag { color: #2980b9; font-weight: bold; min-width: 75px; }

        /* --- カメラ画面：ここを大幅修正 --- */
        #camera-view { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 2000; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        /* ロック時のデカ文字バナー */
        #lock-banner { 
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: white; padding: 15px 40px; border-radius: 40px;
            font-weight: bold; font-size: 1.4rem; z-index: 2100; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: none; white-space: nowrap;
        }

        /* 画面中央の枠 */
        .focus-frame { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 250px; border: 2px solid rgba(255,255,255,0.5); border-radius: 20px; 
            z-index: 2050; pointer-events: none;
        }
        .focus-frame.locked { border: 6px solid var(--accent); background: rgba(39, 174, 96, 0.2); }

        /* 下部操作パネル：最前面に固定 */
        .control-panel { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: rgba(255,255,255,0.95); padding: 20px 0 40px 0;
            text-align: center; border-radius: 30px 30px 0 0; z-index: 2200;
        }
        
        /* 【最重要】スキャン実行ボタン */
        #scan-btn { 
            display: none; /* 初期は非表示 */
            margin: 0 auto 20px auto; width: 85%; 
            background: var(--accent); color: white; border: none; 
            padding: 20px; border-radius: 50px; font-size: 1.4rem; font-weight: bold;
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
        }
        
        .btn-sub { border: none; background: none; color: #666; font-size: 1rem; padding: 10px 20px; font-weight: bold; }

        /* 共通下部ナビ */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 1001; }
        nav div { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #95a5a6; }
        nav div.active { color: var(--primary); border-top: 3px solid var(--primary); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="list-view">
    <header>統合デジタル手帳</header>
    <div id="tabs" class="tab-bar"></div>
    <div id="main-content"></div>
</div>

<div id="import-view" class="hidden" style="padding:20px;">
    <div style="background:white; padding:15px; border-radius:10px; margin-bottom:15px;">
        <h3>Outlook予定取込(.csv)</h3>
        <input type="file" id="csvFile" accept=".csv" onchange="processCSV()">
    </div>
    <div style="background:#e8f4fd; padding:15px; border-radius:10px;">
        <h3>データ同期(.json)</h3>
        <button onclick="exportAllData()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:5px; margin-bottom:10px;">バックアップ保存</button>
        <input type="file" id="importFile" accept=".json" onchange="importAllData()">
    </div>
</div>

<div id="camera-view" class="hidden">
    <video id="video" autoplay playsinline></video>
    <div id="lock-banner">日付をロックしました！</div>
    <div id="focus-frame" class="focus-frame"></div>
    
    <div class="control-panel">
        <div id="date-display" style="font-size:1.2rem; font-weight:bold; margin-bottom:15px; color:#333;">QRを探しています...</div>
        
        <button id="scan-btn" onclick="executeScan()">ページをスキャンして保存</button>
        
        <div style="display:flex; justify-content:space-around;">
            <button class="btn-sub" style="color:var(--danger);" onclick="resetScan()">やり直し</button>
            <button class="btn-sub" onclick="changeMode('list')">閉じる</button>
        </div>
    </div>
    <canvas id="canvas-temp" style="display:none;"></canvas>
</div>

<nav>
    <div id="nav-list" onclick="changeMode('list')">📖 見る</div>
    <div id="nav-camera" onclick="changeMode('camera')">📸 撮影</div>
    <div id="nav-import" onclick="changeMode('import')">📥 設定</div>
</nav>

<script>
let db;
let outlookSchedule = {};
let currentMonth = "";
let lockedDate = null;
let scanActive = false;

// DB初期化（名前を変えてリセット）
const req = indexedDB.open("DiaryApp_v11", 1);
req.onupgradeneeded = e => {
    let d = e.target.result;
    d.createObjectStore("pages", { keyPath: "date" });
    d.createObjectStore("schedule", { keyPath: "date" });
};
req.onsuccess = e => { db = e.target.result; loadAllData(); };

function changeMode(m) {
    document.getElementById('list-view').classList.add('hidden');
    document.getElementById('import-view').classList.add('hidden');
    document.getElementById('camera-view').classList.add('hidden');
    document.getElementById(m + '-view').classList.remove('hidden');
    
    document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
    document.getElementById('nav-' + m).classList.add('active');
    
    if(m === 'camera') startCamera(); else stopCamera();
}

async function startCamera() {
    const v = document.getElementById('video');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", focusMode: "continuous", width: { ideal: 1920 } } });
        v.srcObject = stream;
        scanActive = true;
        resetScan();
        requestAnimationFrame(tick);
    } catch(err) { alert("カメラ起動エラー: " + err); }
}

function stopCamera() {
    scanActive = false;
    const v = document.getElementById('video');
    if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
}

function tick() {
    if(!scanActive || lockedDate) return;
    const v = document.getElementById('video');
    const c = document.getElementById('canvas-temp');
    if(v.readyState === v.HAVE_ENOUGH_DATA) {
        c.width = v.videoWidth; c.height = v.videoHeight;
        const ctx = c.getContext('2d', { willReadFrequently: true });
        ctx.drawImage(v, 0, 0);
        const code = jsQR(ctx.getImageData(0,0,c.width,c.height).data, c.width, c.height);
        if(code && code.data.length === 8 && !isNaN(code.data)) {
            applyLock(code.data);
            return;
        }
    }
    requestAnimationFrame(tick);
}

function applyLock(date) {
    lockedDate = date;
    if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
    
    // 表示の強制切り替え
    document.getElementById('focus-frame').className = "focus-frame locked";
    document.getElementById('lock-banner').style.display = "block";
    document.getElementById('date-display').innerHTML = `<span style="color:var(--accent)">読み込み成功：</span>${date.substring(0,4)}/${date.substring(4,6)}/${date.substring(6,8)}`;
    
    // ボタンを絶対に出現させる
    const btn = document.getElementById('scan-btn');
    btn.style.display = "block";
    btn.innerText = "ページをスキャンして保存";
}

function resetScan() {
    lockedDate = null;
    document.getElementById('focus-frame').className = "focus-frame";
    document.getElementById('lock-banner').style.display = "none";
    document.getElementById('date-display').innerText = "QRを探しています...";
    document.getElementById('scan-btn').style.display = "none";
    if(scanActive) requestAnimationFrame(tick);
}

function executeScan() {
    const v = document.getElementById('video');
    const c = document.createElement('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    const ctx = c.getContext('2d');
    ctx.filter = "contrast(1.1) brightness(1.05)";
    ctx.drawImage(v, 0, 0);
    
    const imgData = c.toDataURL("image/jpeg", 0.75);
    const tx = db.transaction(["pages"], "readwrite");
    tx.objectStore("pages").put({ date: lockedDate, image: imgData });
    tx.oncomplete = () => {
        alert(lockedDate + " を保存しました");
        loadAllData();
        resetScan();
    };
}

// 共通処理
function loadAllData() {
    db.transaction(["schedule"], "readonly").objectStore("schedule").getAll().onsuccess = e => {
        outlookSchedule = {};
        e.target.result.forEach(row => outlookSchedule[row.date] = row.events);
        renderTabs();
    };
}

function renderTabs() {
    db.transaction(["pages"], "readonly").objectStore("pages").getAllKeys().onsuccess = e => {
        const imgDates = e.target.result;
        const allDates = [...new Set([...imgDates, ...Object.keys(outlookSchedule)])];
        const months = [...new Set(allDates.map(d => d.substring(0,6)))].sort().reverse();
        if(!currentMonth && months.length > 0) currentMonth = months[0];
        document.getElementById('tabs').innerHTML = months.map(m => `<span class="tab ${m===currentMonth?'active':''}" onclick="currentMonth='${m}';renderTabs();">${m.substring(0,4)}/${m.substring(4,6)}</span>`).join('');
        renderContent(imgDates);
    };
}

function renderContent(imgDates) {
    const container = document.getElementById('main-content');
    container.innerHTML = "";
    const targetDates = [...new Set([...imgDates, ...Object.keys(outlookSchedule)])].filter(d => d.startsWith(currentMonth)).sort().reverse();

    targetDates.forEach(date => {
        const card = document.createElement('div');
        card.className = "page-card";
        db.transaction(["pages"],"readonly").objectStore("pages").get(date).onsuccess = e => {
            const hasImg = !!e.target.result;
            let sch = `<div class="schedule-box">`;
            if(outlookSchedule[date]) outlookSchedule[date].forEach(ev => { sch += `<div class="event-item"><span class="time-tag">${ev.start.substring(0,5)}</span>${ev.title}</div>`; });
            sch += `</div>`;
            card.innerHTML = `<div class="card-header"><span class="date-label">${date.substring(0,4)}/${date.substring(4,6)}/${date.substring(6,8)}</span>${hasImg ? `<button style="border:none;background:none;color:var(--danger);font-size:0.8rem;" onclick="deletePage('${date}')">画像削除</button>` : ''}</div><div class="img-container" onclick="toggleZoom(this)">${hasImg ? `<img src="${e.target.result.image}" class="diary-img">` : `<div style="padding:40px; text-align:center; color:#ccc; background:#f9f9f9;">(画像なし)</div>`}</div>${sch}`;
        };
        container.appendChild(card);
    });
}

function toggleZoom(container) {
    const img = container.querySelector('img');
    if(!img) return;
    if(img.style.transform === "scale(2)") { img.style.transform = "scale(1)"; container.style.overflow = "hidden"; }
    else { img.style.transform = "scale(2)"; container.style.overflow = "auto"; }
}

function deletePage(date) {
    if(confirm("削除しますか？")) db.transaction(["pages"], "readwrite").objectStore("pages").delete(date).oncomplete = () => loadAllData();
}

function processCSV() {
    const f = document.getElementById('csvFile').files[0];
    const r = new FileReader();
    r.onload = e => {
        const rows = e.target.result.split(/\r(?!\n)|\n|\r\n/);
        const tx = db.transaction(["schedule"], "readwrite");
        const store = tx.objectStore("schedule");
        rows.forEach((line, idx) => {
            if(idx === 0 || !line.trim()) return;
            const c = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            if(c && c.length >= 6) {
                const clean = c.map(v => v.replace(/^"|"$/g, '').trim());
                const d = clean[1].split('/');
                if(d.length === 3) {
                    const key = d[0] + d[1].padStart(2,'0') + d[2].padStart(2,'0');
                    store.get(key).onsuccess = event => {
                        let data = event.target.result || { date: key, events: [] };
                        data.events.push({ start: clean[2], title: clean[0] });
                        store.put(data);
                    };
                }
            }
        });
        tx.oncomplete = () => { alert("取込完了"); loadAllData(); changeMode('list'); };
    };
    r.readAsText(f, "Shift-JIS");
}

async function exportAllData() {
    const tx = db.transaction(["pages", "schedule"], "readonly");
    const pages = await new Promise(r => tx.objectStore("pages").getAll().onsuccess = e => r(e.target.result));
    const schedule = await new Promise(r => tx.objectStore("schedule").getAll().onsuccess = e => r(e.target.result));
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify({ pages, schedule })], { type: "application/json" }));
    a.download = `diary_backup.json`;
    a.click();
}

function importAllData() {
    const f = document.getElementById('importFile').files[0];
    const r = new FileReader();
    r.onload = e => {
        const d = JSON.parse(e.target.result);
        const tx = db.transaction(["pages", "schedule"], "readwrite");
        d.pages.forEach(p => tx.objectStore("pages").put(p));
        d.schedule.forEach(s => tx.objectStore("schedule").put(s));
        tx.oncomplete = () => { alert("同期完了"); location.reload(); };
    };
    r.readAsText(f);
}
</script>
</body>
</html>
